<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #1a1a2e;
            --card-from: #0f3460;
            --card-to: #16213e;
            --accent: #00feba;
            --accent2: #5b54ea;
            --text: #ffffff;
            --subtext: #a8b2d8;
            --input-bg: #0d1b2a;
            --input-text: #c8d6e5;
            --btn-bg: #00feba22;
            --btn-hover: #00feba44;
            --toggle-bg: #0d1b2a;
            --toggle-active: #00feba;
            --toggle-text-active: #0d1b2a;
            --shadow: 0 20px 60px rgba(0,0,0,0.5);
            --detail-bg: rgba(255,255,255,0.05);
        }

        :root[data-theme="light"] {
            --bg: #e8f4f8;
            --card-from: #74b9ff;
            --card-to: #a29bfe;
            --accent: #0984e3;
            --accent2: #6c5ce7;
            --text: #2d3436;
            --subtext: #636e72;
            --input-bg: #ffffff;
            --input-text: #2d3436;
            --btn-bg: rgba(255,255,255,0.6);
            --btn-hover: rgba(255,255,255,0.9);
            --toggle-bg: rgba(255,255,255,0.5);
            --toggle-active: #0984e3;
            --toggle-text-active: #ffffff;
            --shadow: 0 20px 60px rgba(116,185,255,0.4);
            --detail-bg: rgba(255,255,255,0.25);
        }

        :root[data-theme="sunset"] {
            --bg: #1a0a00;
            --card-from: #ff6b35;
            --card-to: #c0392b;
            --accent: #ffd32a;
            --accent2: #ff4757;
            --text: #fff5e6;
            --subtext: #ffcba4;
            --input-bg: #2d0f00;
            --input-text: #ffe0c3;
            --btn-bg: rgba(255,211,42,0.15);
            --btn-hover: rgba(255,211,42,0.3);
            --toggle-bg: rgba(0,0,0,0.25);
            --toggle-active: #ffd32a;
            --toggle-text-active: #1a0a00;
            --shadow: 0 20px 60px rgba(255,107,53,0.4);
            --detail-bg: rgba(255,255,255,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.4s ease;
        }

        .wrapper {
            width: 100%;
            max-width: 470px;
        }

        /* Theme switcher */
        .theme-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 16px;
        }

        .theme-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }

        .theme-btn:hover { transform: scale(1.15); }
        .theme-btn.active { border-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .theme-btn[data-t="dark"]   { background: linear-gradient(135deg, #0f3460, #1a1a2e); }
        .theme-btn[data-t="light"]  { background: linear-gradient(135deg, #74b9ff, #a29bfe); }
        .theme-btn[data-t="sunset"] { background: linear-gradient(135deg, #ff6b35, #ffd32a); }

        /* Card */
        .card {
            background: linear-gradient(135deg, var(--card-from), var(--card-to));
            color: var(--text);
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
        }

        /* Search */
        .search {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .search input {
            border: 0;
            outline: 0;
            background: var(--input-bg);
            color: var(--input-text);
            padding: 0 22px;
            height: 54px;
            border-radius: 27px;
            flex: 1;
            font-size: 16px;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .search input:focus {
            box-shadow: 0 0 0 2px var(--accent);
        }

        .search input::placeholder { color: var(--subtext); opacity: 0.7; }

        .search button {
            border: 0;
            outline: 0;
            background: var(--btn-bg);
            border-radius: 50%;
            width: 54px;
            height: 54px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: background 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .search button:hover { background: var(--btn-hover); transform: scale(1.08); }

        .search button svg { width: 22px; height: 22px; stroke: var(--accent); }

        /* Weather display */
        .weather {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .weather-icon {
            font-size: 80px;
            margin-bottom: 6px;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        /* Temp row */
        .temp-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 4px;
        }

        .temp {
            font-size: 64px;
            font-weight: 600;
            letter-spacing: -2px;
            line-height: 1;
        }

        /* Degree Toggle */
        .deg-toggle {
            display: flex;
            background: var(--toggle-bg);
            border-radius: 20px;
            padding: 4px;
            gap: 2px;
            backdrop-filter: blur(6px);
            align-self: flex-start;
            margin-top: 6px;
        }

        .deg-btn {
            border: none;
            background: transparent;
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.25s, color 0.25s;
        }

        .deg-btn.active {
            background: var(--toggle-active);
            color: var(--toggle-text-active);
        }

        .city {
            font-size: 22px;
            font-weight: 400;
            color: var(--subtext);
            margin-top: 4px;
        }

        .description {
            font-size: 14px;
            color: var(--subtext);
            text-transform: capitalize;
            margin-top: 2px;
        }

        /* Details */
        .details {
            display: flex;
            justify-content: space-around;
            margin-top: 32px;
            padding: 20px 10px;
            background: var(--detail-bg);
            border-radius: 16px;
            backdrop-filter: blur(6px);
        }

        .col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .col-icon { font-size: 28px; }

        .col-value {
            font-size: 22px;
            font-weight: 600;
        }

        .col-label {
            font-size: 12px;
            color: var(--subtext);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider {
            width: 1px;
            background: rgba(255,255,255,0.15);
            align-self: stretch;
        }

        .error-msg {
            font-size: 14px;
            color: #ff7675;
            margin-top: 12px;
            text-align: center;
            min-height: 20px;
        }

        .spinner {
            display: none;
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner.show { display: block; }
    </style>
</head>
<body>
<div class="wrapper">

    <div class="theme-bar">
        <button class="theme-btn active" data-t="dark"   title="Dark"></button>
        <button class="theme-btn"        data-t="light"  title="Light"></button>
        <button class="theme-btn"        data-t="sunset" title="Sunset"></button>
    </div>

    <div class="card">
    
        <div class="search">
            <input type="text" id="city-input" placeholder="Search city…" spellcheck="false">
            <button id="search-btn" title="Search">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"/>
                    <line x1="16.5" y1="16.5" x2="22" y2="22"/>
                </svg>
            </button>
        </div>

    
        <div class="spinner" id="spinner"></div>


        <div class="weather" id="weather-box">
            <span class="weather-icon" id="weather-icon">🌤️</span>

            <div class="temp-row">
                <div class="temp" id="temp">22°C</div>
                <div class="deg-toggle">
                    <button class="deg-btn active" id="btn-c">°C</button>
                    <button class="deg-btn"         id="btn-f">°F</button>
                </div>
            </div>

            <div class="city" id="city">New York</div>
            <div class="description" id="description">partly cloudy</div>

            <div class="details">
                <div class="col">
                    <span class="col-icon">💧</span>
                    <span class="col-value" id="humidity">50%</span>
                    <span class="col-label">Humidity</span>
                </div>
                <div class="divider"></div>
                <div class="col">
                    <span class="col-icon">💨</span>
                    <span class="col-value" id="wind">15 km/h</span>
                    <span class="col-label">Wind</span>
                </div>
                <div class="divider"></div>
                <div class="col">
                    <span class="col-icon">🌡️</span>
                    <span class="col-value" id="feels-like">20°C</span>
                    <span class="col-label">Feels like</span>
                </div>
            </div>
        </div>

        <div class="error-msg" id="error-msg"></div>
    </div>
</div>

<script>
    const apiKey= "c8132bbc311fd45a8369d2fccd14a3e1";
    const apiUrl="https://api.openweathermap.org/data/2.5/weather?units=metric&q=";



    const cityInput   = document.getElementById("city-input");
    const searchBtn   = document.getElementById("search-btn");
    const spinner     = document.getElementById("spinner");
    const weatherBox  = document.getElementById("weather-box");
    const errorMsg    = document.getElementById("error-msg");

    const tempEl      = document.getElementById("temp");
    const cityEl      = document.getElementById("city");
    const descEl      = document.getElementById("description");
    const humidityEl  = document.getElementById("humidity");
    const windEl      = document.getElementById("wind");
    const feelsEl     = document.getElementById("feels-like");
    const iconEl      = document.getElementById("weather-icon");
    const btnC        = document.getElementById("btn-c");
    const btnF        = document.getElementById("btn-f");

    let currentTempC  = 22;
    let currentFeelsC = 20;
    let isCelsius     = true;

    function getEmoji(id) {
        if (id >= 200 && id < 300) return "⛈️";
        if (id >= 300 && id < 400) return "🌦️";
        if (id >= 500 && id < 600) return "🌧️";
        if (id >= 600 && id < 700) return "❄️";
        if (id >= 700 && id < 800) return "🌫️";
        if (id === 800)            return "☀️";
        if (id === 801)            return "🌤️";
        if (id === 802)            return "⛅";
        if (id >= 803)             return "☁️";
        return "🌡️";
    }

    function toF(c) { return Math.round(c * 9/5 + 32); }
    function formatTemp(c) {
        return isCelsius ? `${Math.round(c)}°C` : `${toF(c)}°F`;
    }

    function updateDisplay() {
        tempEl.textContent  = formatTemp(currentTempC);
        feelsEl.textContent = formatTemp(currentFeelsC);
    }

    // --- Fetch weather ---
    async function checkWeather(city) {
        if (!city.trim()) return;
        errorMsg.textContent = "";
        spinner.classList.add("show");
        weatherBox.style.opacity = "0.4";

        try {
            const res  = await fetch(apiUrl + city + `&appid=${apiKey}`);
            const data = await res.json();

            if (data.cod !== 200) throw new Error(data.message || "City not found");

            currentTempC  = data.main.temp;
            currentFeelsC = data.main.feels_like;

            cityEl.textContent    = data.name + ", " + data.sys.country;
            descEl.textContent    = data.weather[0].description;
            humidityEl.textContent = data.main.humidity + "%";
            windEl.textContent    = data.wind.speed + " km/h";
            iconEl.textContent    = getEmoji(data.weather[0].id);

            updateDisplay();
        } catch (err) {
            errorMsg.textContent = "⚠️ " + (err.message === "City not found" ? "City not found. Try again." : "Could not fetch data.");
        } finally {
            spinner.classList.remove("show");
            weatherBox.style.opacity = "1";
        }
    }

    btnC.addEventListener("click", () => {
        if (isCelsius) return;
        isCelsius = true;
        btnC.classList.add("active");
        btnF.classList.remove("active");
        updateDisplay();
    });

    btnF.addEventListener("click", () => {
        if (!isCelsius) return;
        isCelsius = false;
        btnF.classList.add("active");
        btnC.classList.remove("active");
        updateDisplay();
    });
    searchBtn.addEventListener("click", () => checkWeather(cityInput.value));
    cityInput.addEventListener("keydown", e => { if (e.key === "Enter") checkWeather(cityInput.value); });

    document.querySelectorAll(".theme-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.documentElement.setAttribute("data-theme", btn.dataset.t);
            document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
        });
    });
</script>
</body>
</html>
